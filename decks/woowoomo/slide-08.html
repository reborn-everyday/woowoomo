<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #0d0d0d;
      padding: 48pt;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <!-- 로고 -->
  <div style="display: flex; align-items: center; gap: 8pt;">
    <div style="width: 8pt; height: 8pt; background: #ffffff; border-radius: 50%;"></div>
    <p style="font-size: 11pt; font-weight: 600; color: #ffffff; letter-spacing: 0.02em;">우우모</p>
  </div>

  <!-- 메인 비전 -->
  <div>
    <p style="font-size: 10pt; color: #555; letter-spacing: 0.08em; margin-bottom: 16pt;">VISION</p>
    <h1 style="font-size: 32pt; font-weight: 500; color: #ffffff; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 20pt;">
      지금은 하루를 복원합니다.<br>
      다음은 당신의<br>
      <span style="font-weight: 700;">에이전트 OS</span>가 됩니다.
    </h1>
    <p style="font-size: 12pt; color: #666; line-height: 1.8; max-width: 480pt;">
      인간의 행동 데이터를 가장 정밀하게 가진 이 앱은,<br>
      향후 모든 퍼스널 에이전트의 OS가 됩니다.<br>
      <span style="color: #999;">의지의 영역을 시스템의 영역으로.</span><br>
      <span style="color: #777;">이것이 신경다양성 시대를 위한 인지 인프라입니다.</span>
    </p>
  </div>

  <!-- 마지막 한 줄 + GitHub -->
  <div style="display: flex; justify-content: space-between; align-items: flex-end;">
    <div style="border-left: 2pt solid #ffffff; padding-left: 14pt;">
      <p style="font-size: 14pt; font-weight: 500; color: #ffffff; font-style: italic; line-height: 1.5;">
        "우우모는 당신이 원하던 삶을,<br>데이터로 되찾아 줍니다."
      </p>
    </div>
    <div style="text-align: right;">
      <p style="font-size: 9pt; color: #555; margin-bottom: 4pt;">GITHUB</p>
      <p style="font-size: 10pt; color: #666;">github.com/reborn-everyday/woowoomo</p>
    </div>
  </div>
</body>
</html>
