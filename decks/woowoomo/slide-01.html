<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #0d0d0d;
      padding: 36pt 48pt;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <div style="display: flex; align-items: center; gap: 10pt;">
      <div style="width: 8pt; height: 8pt; background: #ffffff; border-radius: 50%;"></div>
      <p style="font-size: 11pt; font-weight: 600; color: #ffffff; letter-spacing: 0.02em;">우우모</p>
    </div>
    <p style="display: inline-block; padding: 4pt 12pt; border: 1px solid #444; border-radius: 12pt; font-size: 8pt; font-weight: 500; color: #999; letter-spacing: 0.06em;">RALPHTHON SEOUL 2025</p>
  </div>

  <!-- 메인 타이틀 -->
  <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 16pt 0;">
    <p style="font-size: 10pt; color: #666; letter-spacing: 0.08em; margin-bottom: 20pt;">QUESTION</p>
    <h1 style="font-size: 34pt; font-weight: 500; color: #ffffff; letter-spacing: -0.02em; line-height: 1.3; max-width: 520pt;">
      여러분은 오늘 하루,<br>
      정말 원하던 삶을<br>
      <span style="color: #ffffff; font-weight: 700;">몇 분이나</span> 사셨나요?
    </h1>
    <div style="margin-top: 24pt; display: flex; align-items: center; gap: 16pt;">
      <div style="width: 32pt; height: 1pt; background: #444;"></div>
      <p style="font-size: 12pt; color: #888; font-style: italic;">우리도 우리를 모른다 — We Don't Know Ourselves</p>
    </div>
  </div>

  <!-- 팀 정보 -->
  <div style="display: flex; justify-content: space-between; align-items: flex-end;">
    <div>
      <p style="font-size: 9pt; color: #555; margin-bottom: 4pt;">TEAM</p>
      <p style="font-size: 11pt; font-weight: 500; color: #ccc;">홍다솔 · 홍연정 · 권오영 · 조용래</p>
    </div>
    <div style="text-align: right;">
      <p style="font-size: 9pt; color: #555; margin-bottom: 4pt;">GITHUB</p>
      <p style="font-size: 10pt; color: #666;">github.com/reborn-everyday/woowoomo</p>
    </div>
  </div>
</body>
</html>
